<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <title>念之試煉：緋眼獵名</title>
  <link rel="stylesheet"
    href="styles.css">

  <meta name="title"
    content="念之試煉：緋眼獵名">
  <meta name="description"
    content="選擇緋紅眼或嘴砲，在二十秒內刻下唯一之名">

  <meta property="og:type"
    content="website">
  <meta property="og:title"
    content="念之試煉：緋眼獵名">
  <meta property="og:description"
    content="選擇緋紅眼或嘴砲，在二十秒內刻下唯一之名">

  <meta property="twitter:card"
    content="summary_large_image">
  <meta property="twitter:title"
    content="念之試煉：緋眼獵名">
  <meta property="twitter:description"
    content="選擇緋紅眼或嘴砲，在二十秒內刻下唯一之名">

  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111111'/%3E%3Ccircle cx='32' cy='32' r='18' fill='%2368ff98'/%3E%3Cpath d='M22 27h20M25 39h14' stroke='%23ff00ff' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
</head>

<body>
  <div id="gameContainer">
    <a class="lobby-link"
      href="../入口/index.html">返回大廳</a>
    <video id="videoElement"
      autoplay
      muted
      playsinline></video>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
      <div>剩餘時限：<span id="timer" data-total-seconds="20">20</span> 秒</div>
      <div>命中總數：<span id="score">0</span></div>
      <div>暫居首位：<span id="leaderName">尚無</span></div>
    </div>
    <div id="flowStatus">正在確認目前學弟妹...</div>

    <div id="leftEye"
      class="eye-glow"
      style="display: none;"></div>
    <div id="rightEye"
      class="eye-glow"
      style="display: none;"></div>
    <div id="mouthPortal"
      class="mouth-portal"
      style="display: none;"></div>

    <div id="start-overlay">
      <p>念能力試煉</p>
      <div id="abilitySelector"
        class="ability-selector"
        role="group"
        aria-label="選擇念能力">
        <button class="ability-option active"
          type="button"
          data-ability="eye">緋紅眼</button>
        <button class="ability-option"
          type="button"
          data-ability="mouth">嘴砲</button>
      </div>
      <p>緋紅眼以凝視射擊，嘴砲需張口釋放念光。</p>
      <button id="startButton">開始試煉</button>
    </div>

    <div id="gameOverScreen">
      <p>時限已盡</p>
      <p>唯一之名：<span id="winnerName">尚無</span></p>
      <p>總命中：<span id="finalScore">0</span></p>
      <p id="resultStatus">等待配對寫入...</p>
      <a class="result-lobby-link"
        href="../入口/index.html">返回大廳</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
  <script src="../shared/flow-state.js"></script>
  <script src="createFallBackTextures.js"></script>
  <script src="main.js?v=20s"></script>
  <script src="sound.js"></script>
</body>

</html>
