<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>古早味玄幻遊戲房間</title>
    <style>
        :root {
            --depth: 500px;
            --turnLeft: 0.06turn;
            --turnRight: -0.06turn;
            --turn: var(--turnRight);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background: hsl(0 0% 10%);
            perspective: 1000px;
            perspective-origin: 50% 35%;
            overflow-x: hidden;
        }

        .building {
            transform-style: preserve-3d;
        }

        .room {
            position: relative;
            border: 4vh solid hsl(0 0% 10%);
            height: 80vh;
            width: 100vw;
            scroll-snap-align: center;
            transform-style: preserve-3d;
        }

        .room+.room {
            border-top: 0;
        }

        .room-link {
            display: block;
            color: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        .room-link:focus-visible {
            outline: 0.6vh solid hsl(43 100% 72% / 82%);
            outline-offset: -1.2vh;
        }

        .room::before,
        .room::after {
            content: '';
            position: absolute;
            height: var(--depth);
            width: 100%;
            backface-visibility: hidden;
        }

        .room::before {
            background:
                radial-gradient(hsl(0 0% 100% / 10%), hsl(0 0% 0% / 10%)),
                lightgray;
            /* TODO: Change back to -90deg after Webkit fixes https://bugs.webkit.org/show_bug.cgi?id=265309 */
            transform: rotatex(-89.99999deg) scale(1.001);
            transform-origin: center top;
        }

        .room::after {
            bottom: 0;
            background:
                radial-gradient(hsl(0 0% 100% / 10%), hsl(0 0% 0% / 10%)),
                url('木地板.avif') center top / cover,
                sandybrown;
            /* TODO: Change back to 90deg after Webkit fixes https://bugs.webkit.org/show_bug.cgi?id=265309 */
            transform: rotateX(89.99999deg);
            transform-origin: center bottom;
        }

        .room-walls {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, hsl(0 0% 90%) 2.5vh, transparent 0),
                radial-gradient(hsl(0 0% 0% / 30%), hsl(0 0% 0% / 50%)),
                url('海.avif') center / cover,
                darkgray;
            transform: translatez(calc(var(--depth) * -1));
            transform-style: preserve-3d;
        }

        .room-walls::before,
        .room-walls::after {
            content: '';
            position: absolute;
            height: 100%;
            width: var(--depth);
        }

        .room-walls::before {
            right: 100%;
            background:
                linear-gradient(to top, hsl(0 0% 75%) 2.5vh, transparent 0),
                radial-gradient(hsl(0 0% 100% / 10%), hsl(0 0% 0% / 10%)),
                url('山.avif') center / cover,
                gray;
            /* TODO: Change back to 90deg after Webkit fixes https://bugs.webkit.org/show_bug.cgi?id=265309 */
            transform: rotatey(89.99999deg);
            transform-origin: right center;
        }

        .room-walls::after {
            left: 100%;
            background:
                linear-gradient(to top, hsl(0 0% 75%) 2.5vh, transparent 0),
                radial-gradient(hsl(0 0% 100% / 10%), hsl(0 0% 0% / 10%)),
                url('森林.avif') center / cover,
                gray;
            /* TODO: Change back to -90deg after Webkit fixes https://bugs.webkit.org/show_bug.cgi?id=265309 */
            transform: rotatey(-89.99999deg);
            transform-origin: left center;
        }

        .room-content {
            display: grid;
            place-content: center;
            height: 100%;
            width: 100%;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            font-size: clamp(1em, 20vmin, 8em);
            font-weight: 200;
            text-align: center;
            text-shadow: 0 5px 10px hsl(0 0% 0% / 20%);
            transform: translatez(calc(var(--depth) / -2)) rotatey(var(--turn));
        }

        .room:nth-child(odd)>.room-content {
            --turn: var(--turnLeft);
        }

        .room.gandian-room::before {
            background:
                radial-gradient(circle at 28% 36%, hsl(42 100% 72% / 32%), transparent 10rem),
                radial-gradient(circle at 72% 24%, hsl(7 82% 58% / 22%), transparent 10rem),
                linear-gradient(hsl(36 58% 24%), hsl(26 54% 10%));

        .room.gandian-room::after {
            background:
                radial-gradient(hsl(42 100% 82% / 18%), hsl(0 0% 0% / 28%)),

        .gandian-room>.room-walls {
