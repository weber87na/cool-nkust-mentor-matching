<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>柑仔店 LED 抽抽樂</title>
  <style>
    :root {
      color-scheme: light;
      --red: #b92721;
      --deep-red: #7b1814;
      --gold: #ffd66b;
      --paper: #fff2c5;
      --ink: #3c2113;
      --green: #1f7a55;
      --blue: #1c5fa8;
      --wood: #8a4d25;
      --shadow: rgba(45, 20, 8, .28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 226, 117, .5), transparent 24rem),
        linear-gradient(90deg, rgba(100, 47, 19, .11) 1px, transparent 1px),
        linear-gradient(#b86b35, #7a3e1d);
      background-size: auto, 44px 44px, auto;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .24;
      background:
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(55, 22, 6, .32) 29px 32px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .05) 0 1px, transparent 2px 5px);
      mix-blend-mode: multiply;
    }

    .lobby-link {
      position: fixed;
      z-index: 20;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      padding: 9px 14px;
      border: 3px solid var(--gold);
      border-radius: 999px;
      color: #fff2c5;
      background: rgba(123, 24, 20, .9);
      box-shadow: 0 4px 0 rgba(45, 20, 8, .34);
      font-weight: 900;
      text-decoration: none;
    }

    .lobby-link:focus-visible {
      outline: 4px solid #fff2c5;
      outline-offset: 3px;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 30px;
    }

    .shop-sign {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      min-height: 144px;
      padding: 18px 22px;
      border: 7px solid #5f260f;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .16), transparent 34%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, .08) 0 2px, transparent 3px 15px),
        var(--red);
      box-shadow: 0 20px 42px var(--shadow), inset 0 0 0 4px rgba(255, 214, 107, .38);
      overflow: hidden;
    }

    .shop-sign::after {
      content: "";
      position: absolute;
      inset: 9px;
      border: 2px dashed rgba(255, 237, 166, .7);
      border-radius: 3px;
      pointer-events: none;
    }

    .sign-copy {
      position: relative;
      z-index: 1;
    }

    .tagline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      margin: 0 0 8px;
      color: #fff8dc;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0;
      background: var(--green);
      border: 2px solid #fff0aa;
      transform: rotate(-1deg);
    }

    h1 {
      margin: 0;
      color: #fff4bb;
      font-size: clamp(42px, 8vw, 94px);
      line-height: .95;
      letter-spacing: 0;
      text-shadow: 0 4px 0 var(--deep-red), 0 0 18px rgba(255, 232, 115, .7);
    }

    .subtitle {
      margin: 10px 0 0;
      color: #fff7d7;
      font-weight: 700;
      font-size: clamp(16px, 2vw, 22px);
    }

    .led-board {
      position: relative;
      z-index: 1;
      width: min(310px, 100%);
      padding: 12px;
      border: 4px solid #2a140b;
      background: #130e09;
      box-shadow: inset 0 0 16px rgba(0, 0, 0, .75);
    }

    .led-text {
      height: 46px;
      overflow: hidden;
      white-space: nowrap;
      color: #ffdf4b;
      font-family: Consolas, "Courier New", monospace;
      font-size: 22px;
      font-weight: 900;
      text-shadow: 0 0 8px #ffc400, 0 0 15px #ff6c00;
    }

    .led-text span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 9s linear infinite;
    }

    .bulbs {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .bulb {
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px #ffe36a;
      animation: blink 1.2s steps(2, end) infinite;
    }

    .bulb:nth-child(3n) {
      background: #ff5a5a;
      box-shadow: 0 0 12px #ff5a5a;
      animation-delay: .25s;
    }

    .bulb:nth-child(3n + 1) {
      background: #73e2ff;
      box-shadow: 0 0 12px #73e2ff;
      animation-delay: .55s;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(280px, 390px) 1fr;
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .machine,
    .wall,
    .drawn-panel {
      border: 6px solid #5d2b13;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .2), transparent 22%, rgba(65, 25, 5, .12) 72%),
        var(--paper);
      box-shadow: 0 18px 36px var(--shadow);
    }

    .machine {
      position: sticky;
      top: 18px;
      padding: 18px;
    }

    .counter-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      color: #fff6c9;
      font-weight: 900;
      background: var(--blue);
      border: 3px solid #46200d;
    }

    .counter-label small {
      color: #fff;
      font-size: 13px;
    }

    .slot-window {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 320px;
      margin: 16px 0;
      border: 5px solid #32170c;
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 239, 164, .9), rgba(235, 175, 82, .8) 36%, rgba(100, 45, 18, .7)),
        repeating-linear-gradient(0deg, transparent 0 10px, rgba(86, 38, 15, .12) 11px 12px);
      overflow: hidden;
    }

    .ticket-stack {
      position: absolute;
      inset: 18px;
      display: grid;
      place-items: center;
      transform: rotate(-2deg);
    }

    .paper-strip {
      position: absolute;
      width: 78%;
      height: 48px;
      border: 2px solid #8b4d1d;
      background: #fff7d0;
      box-shadow: 0 5px 0 rgba(60, 28, 9, .18);
    }

    .paper-strip:nth-child(1) { transform: translateY(-78px) rotate(4deg); }
    .paper-strip:nth-child(2) { transform: translateY(-33px) rotate(-3deg); }
    .paper-strip:nth-child(3) { transform: translateY(12px) rotate(2deg); }
    .paper-strip:nth-child(4) { transform: translateY(57px) rotate(-4deg); }

    .winner-card {
      position: relative;
      width: min(240px, 82%);
      min-height: 276px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 10px;
      padding: 12px;
      border: 4px solid var(--deep-red);
      background: #fff8d8;
      box-shadow: 0 12px 0 rgba(85, 36, 12, .28), 0 0 28px rgba(255, 238, 120, .9);
      transform: translateY(12px) rotate(.8deg) scale(.92);
      opacity: 0;
      transition: transform .38s ease, opacity .38s ease;
      z-index: 2;
    }

    .winner-card.show {
      opacity: 1;
      transform: translateY(0) rotate(-1deg) scale(1);
    }

    .winner-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border: 3px solid #572813;
      background: #e8c283;
    }

    .winner-name {
      display: grid;
      place-items: center;
      min-height: 42px;
      color: var(--deep-red);
      font-size: 25px;
      font-weight: 1000;
      text-align: center;
    }

    .draw-button {
      width: 100%;
      min-height: 64px;
      border: 0;
      border-bottom: 7px solid #741612;
      border-radius: 6px;
      color: #fff9c8;
      background:
        radial-gradient(circle at 35% 20%, rgba(255, 255, 255, .32), transparent 22%),
        linear-gradient(#e43d32, #aa201b);
      font-size: 24px;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 10px 16px rgba(68, 22, 8, .24);
    }

    .draw-button:active {
      transform: translateY(4px);
      border-bottom-width: 3px;
    }

    .draw-button:disabled {
      color: #6b4a33;
      background: #c9b38a;
      border-bottom-color: #8c744e;
      cursor: not-allowed;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .cancel-button,
    .reset-button {
      min-height: 48px;
      padding: 0 14px;
      border: 3px solid #4c2511;
      border-radius: 4px;
      color: #fff8dc;
      font-weight: 900;
      cursor: pointer;
    }

    .cancel-button {
      background: var(--green);
    }

    .reset-button {
      background: var(--deep-red);
    }

    .cancel-button:disabled {
      opacity: .58;
      cursor: not-allowed;
    }

    .status {
      margin: 14px 0 0;
      padding: 10px 12px;
      border: 2px dashed #9b5425;
      background: rgba(255, 249, 220, .72);
      font-weight: 800;
      line-height: 1.5;
    }

    .wall {
      padding: 16px;
    }

    .shelf-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 4px double #9d5729;
    }

    .shelf-title h2 {
      margin: 0;
      color: var(--deep-red);
      font-size: clamp(24px, 4vw, 38px);
    }

    .global-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .price-tag {
      flex: 0 0 auto;
      padding: 7px 12px;
      color: #fff7bd;
      background: var(--deep-red);
      font-weight: 1000;
      transform: rotate(2deg);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 12px;
    }

    .prize {
      position: relative;
      min-width: 0;
      padding: 8px;
      border: 3px solid #6e3519;
      background: #fff7d2;
      box-shadow: 0 7px 0 rgba(98, 49, 18, .2);
      cursor: pointer;
      transition: transform .18s ease, opacity .18s ease, filter .18s ease;
    }

    .prize::before {
      content: attr(data-no);
      position: absolute;
      top: -8px;
      left: 8px;
      padding: 2px 7px;
      color: #fff8c8;
      background: var(--red);
      border: 2px solid #60240f;
      font-size: 12px;
      font-weight: 900;
    }

    .prize img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border: 2px solid #5a2a13;
      background: #edcf91;
    }

    .prize span {
      display: block;
      min-height: 32px;
      margin-top: 6px;
      color: #3b1d0e;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .prize.drawn {
      opacity: .42;
      filter: grayscale(.9);
      transform: scale(.96);
      cursor: not-allowed;
    }

    .prize.highlight {
      animation: prizeFlash .55s ease 3;
      z-index: 1;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 42px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 3px solid rgba(115, 58, 24, .28);
    }

    .history-chip {
      padding: 7px 10px;
      border: 2px solid #6b3217;
      color: #fff9d9;
      background: #a72620;
      font-weight: 900;
      box-shadow: 0 4px 0 rgba(61, 27, 10, .2);
    }

    .drawn-panel {
      margin-top: 22px;
      padding: 16px;
    }

    .paired-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .paired-empty {
      margin: 0;
      padding: 16px;
      border: 3px dashed rgba(115, 58, 24, .35);
      color: #7a3e1d;
      background: rgba(255, 247, 210, .62);
      font-weight: 900;
      text-align: center;
    }

    .paired-card {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      min-width: 0;
      padding: 10px;
      border: 3px solid #6e3519;
      background: #fff7d2;
      box-shadow: 0 7px 0 rgba(98, 49, 18, .16);
    }

    .paired-person {
      min-width: 0;
      text-align: center;
    }

    .paired-person img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border: 2px solid #5a2a13;
      background: #edcf91;
    }

    .paired-person strong,
    .paired-person span {
      display: block;
      margin-top: 6px;
      color: #3b1d0e;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .paired-arrow {
      color: var(--deep-red);
      font-size: 24px;
      font-weight: 1000;
    }

    .paired-waiting {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 12px;
      border: 2px dashed #9d5729;
      color: #7a3e1d;
      background: rgba(255, 216, 79, .18);
      font-weight: 900;
      text-align: center;
    }

    .shake {
      animation: shake .54s ease-in-out 2;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 16px;
      top: -20px;
      pointer-events: none;
      animation: fall 1.8s linear forwards;
      z-index: 20;
    }

    @keyframes marquee {
      to { transform: translateX(-100%); }
    }

    @keyframes blink {
      50% { opacity: .35; filter: saturate(.5); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px) rotate(-1deg); }
      40% { transform: translateX(7px) rotate(1deg); }
      60% { transform: translateX(-5px) rotate(.8deg); }
      80% { transform: translateX(5px) rotate(-.8deg); }
    }

    @keyframes prizeFlash {
      50% {
        transform: scale(1.08) rotate(-2deg);
        box-shadow: 0 0 0 5px #ffd84f, 0 0 32px #ff533f;
      }
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(620deg);
        opacity: 0;
      }
    }

    @media (max-width: 820px) {
      .shop-sign,
      .main {
        grid-template-columns: 1fr;
      }

      .led-board {
        width: 100%;
      }

      .machine {
        position: static;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      }
    }
  </style>
</head>
<body>
  <a class="lobby-link" href="../入口/index.html">返回大廳</a>
  <main class="app">
    <header class="shop-sign">
      <div class="sign-copy">
        <p class="tagline">柑仔店門口限定 抽到就上台</p>
        <h1>古早抽抽樂</h1>
        <p class="subtitle">紅包袋、塑膠籤、LED 跑馬燈，今天看誰上台自我介紹。</p>
      </div>
      <section class="led-board" aria-label="LED 跑馬燈">
        <div class="led-text"><span>★★ 來喔來喔  抽到請上台  麥克風準備好了  ★★</span></div>
        <div class="bulbs" aria-hidden="true">
          <i class="bulb"></i><i class="bulb"></i><i class="bulb"></i><i class="bulb"></i>
          <i class="bulb"></i><i class="bulb"></i><i class="bulb"></i><i class="bulb"></i>
          <i class="bulb"></i><i class="bulb"></i><i class="bulb"></i><i class="bulb"></i>
        </div>
      </section>
    </header>

    <section class="main">
      <aside class="machine" id="machine">
        <div class="counter-label">
          <span>抽籤機台</span>
          <small id="remaining">剩餘 0 張</small>
        </div>
        <div class="slot-window" id="slotWindow">
          <div class="ticket-stack" aria-hidden="true">
            <i class="paper-strip"></i>
            <i class="paper-strip"></i>
            <i class="paper-strip"></i>
            <i class="paper-strip"></i>
          </div>
          <article class="winner-card" id="winnerCard" aria-live="polite">
            <img id="winnerImage" alt="">
            <div class="winner-name" id="winnerName">準備開抽</div>
          </article>
        </div>
        <div class="actions">
          <button class="draw-button" id="drawButton" type="button">抽上台！</button>
          <button class="cancel-button" id="cancelButton" type="button">取消這次</button>
        </div>
        <p class="status" id="status">按下抽上台，抽到的人請準備自我介紹。</p>
      </aside>

      <section class="wall">
        <div class="shelf-title">
          <h2>今日上台名單</h2>
          <div class="global-controls">
            <div class="price-tag" id="totalCount">共 0 張</div>
            <button class="reset-button" id="resetButton" type="button">全部重來</button>
          </div>
        </div>
        <div class="grid" id="prizeGrid"></div>
        <div class="history" id="history" aria-label="已上台紀錄"></div>
      </section>
    </section>

    <section class="drawn-panel" aria-labelledby="drawn-title">
      <div class="shelf-title">
        <h2 id="drawn-title">已抽學弟妹</h2>
        <div class="price-tag" id="drawnCount">共 0 位</div>
      </div>
      <div class="paired-list" id="drawnPairList"></div>
    </section>
  </main>

  <script src="../shared/flow-state.js"></script>
  <script>
    let prizes = [];

    const state = {
      bag: [],
      drawn: [],
      spinning: false
    };

    const prizeGrid = document.querySelector("#prizeGrid");
    const drawButton = document.querySelector("#drawButton");
    const cancelButton = document.querySelector("#cancelButton");
    const resetButton = document.querySelector("#resetButton");
    const winnerCard = document.querySelector("#winnerCard");
    const winnerImage = document.querySelector("#winnerImage");
    const winnerName = document.querySelector("#winnerName");
    const statusText = document.querySelector("#status");
    const remainingText = document.querySelector("#remaining");
    const totalCount = document.querySelector("#totalCount");
    const history = document.querySelector("#history");
    const machine = document.querySelector("#machine");
    const slotWindow = document.querySelector("#slotWindow");
    const drawnPairList = document.querySelector("#drawnPairList");
    const drawnCount = document.querySelector("#drawnCount");

    function imagePathFromSenior(senior) {
      return senior ? `../吃角子老虎/img/${encodeURIComponent(senior.照片)}` : "";
    }

    function personBlock(person, imageSrc, label) {
      const block = document.createElement("div");
      block.className = "paired-person";

      const img = document.createElement("img");
      img.src = imageSrc;
      img.alt = person ? `${person.姓名} 的照片` : label;
      img.loading = "lazy";
      img.addEventListener("error", () => img.remove(), { once: true });

      const name = document.createElement("strong");
      name.textContent = person ? person.姓名 : label;
      block.append(img, name);
      return block;
    }

    function renderDrawnPanel(flow) {
      const seniorByName = new Map(flow.seniors.map((senior) => [senior.姓名, senior]));
      const rows = flow.students.filter((student) => student.學長姐 || student.姓名 === flow.currentStudentName);
      drawnPairList.innerHTML = "";
      drawnCount.textContent = `共 ${rows.length} 位`;

      if (!rows.length) {
        const empty = document.createElement("p");
        empty.className = "paired-empty";
        empty.textContent = "還沒有抽過的學弟妹。";
        drawnPairList.append(empty);
        return;
      }

      rows.forEach((student) => {
        const card = document.createElement("article");
        card.className = "paired-card";

        const arrow = document.createElement("div");
        arrow.className = "paired-arrow";
        arrow.textContent = "→";

        const senior = seniorByName.get(student.學長姐);
        const seniorBlock = senior
          ? personBlock(senior, imagePathFromSenior(senior), "學長姐")
          : document.createElement("div");
        if (!senior) {
          seniorBlock.className = "paired-waiting";
          seniorBlock.textContent = "等待配對學長姐";
        }

        card.append(personBlock(student, student.照片, "學弟妹"), arrow, seniorBlock);
        drawnPairList.append(card);
      });
    }

    function renderGrid() {
      prizeGrid.innerHTML = "";
      state.bag.forEach((prize) => {
        const card = document.createElement("article");
        card.className = "prize";
        card.dataset.file = prize.file;
        card.dataset.no = prize.no;
        card.title = `指定 ${prize.name} 上台`;

        const img = document.createElement("img");
        img.src = prize.file;
        img.alt = prize.name;
        img.loading = "lazy";

        const name = document.createElement("span");
        name.textContent = prize.name;

        card.addEventListener("click", () => assignPrize(prize.file));
        card.append(img, name);
        prizeGrid.append(card);
      });
      totalCount.textContent = `共 ${prizes.length} 張`;
      updateCounts();
    }

    function updateCounts() {
      remainingText.textContent = `剩餘 ${state.bag.length} 張`;
      drawButton.disabled = state.spinning || state.bag.length === 0;
      cancelButton.disabled = state.spinning || state.drawn.length === 0;
    }

    function pickPrize() {
      const index = Math.floor(Math.random() * state.bag.length);
      return state.bag.splice(index, 1)[0];
    }

    function takePrize(file) {
      const index = state.bag.findIndex((prize) => prize.file === file);
      if (index === -1) return null;
      return state.bag.splice(index, 1)[0];
    }

    function showOnStage(prize, mode = "draw") {
      winnerImage.src = prize.file;
      winnerImage.alt = prize.name;
      winnerName.textContent = `${prize.no} 號 ${prize.name} 上台`;
      winnerCard.classList.add("show");
      statusText.textContent = mode === "host"
        ? `主持人指定 ${prize.name} 上台自我介紹，麥克風請交給對方。`
        : `抽中 ${prize.name}！請上台自我介紹，掌聲先準備。`;

      renderGrid();

      const chip = document.createElement("span");
      chip.className = "history-chip";
      chip.dataset.file = prize.file;
      chip.textContent = `${prize.no} ${prize.name} 已上台`;
      history.prepend(chip);
      burstConfetti();
      FlowState.setCurrentStudent({ 姓名: prize.name }).then(renderDrawnPanel).catch((error) => {
        statusText.textContent = error.message;
      });
    }

    function rollPreview(finalPrize) {
      const pool = state.bag.length ? state.bag : prizes;
      let ticks = 0;
      const maxTicks = 18;
      return new Promise((resolve) => {
        const timer = setInterval(() => {
          const preview = ticks >= maxTicks - 1
            ? finalPrize
            : pool[Math.floor(Math.random() * pool.length)];
          winnerImage.src = preview.file;
          winnerImage.alt = preview.name;
          winnerName.textContent = `${preview.no} 號 ${preview.name}`;
          winnerCard.classList.add("show");
          ticks += 1;
          if (ticks >= maxTicks) {
            clearInterval(timer);
            resolve();
          }
        }, 82 + ticks * 7);
      });
    }

    async function draw() {
      if (state.spinning || state.bag.length === 0) return;
      state.spinning = true;
      updateCounts();
      winnerCard.classList.remove("show");
      machine.classList.add("shake");
      slotWindow.classList.add("shake");
      statusText.textContent = "塑膠籤正在盒子裡翻滾，等等請人上台。";

      const prize = pickPrize();
      await rollPreview(prize);

      state.drawn.push(prize);
      showOnStage(prize);
      state.spinning = false;
      machine.classList.remove("shake");
      slotWindow.classList.remove("shake");
      updateCounts();
    }

    function assignPrize(file) {
      if (state.spinning) return;
      const prize = takePrize(file);
      if (!prize) {
        statusText.textContent = "這位已經上台過了，請換下一位。";
        return;
      }
      state.drawn.push(prize);
      winnerCard.classList.remove("show");
      window.requestAnimationFrame(() => showOnStage(prize, "host"));
      updateCounts();
    }

    function restorePrize(prize) {
      state.bag.push(prize);
      state.bag.sort((a, b) => Number(a.no) - Number(b.no));
      renderGrid();
      const chip = history.querySelector(`[data-file="${CSS.escape(prize.file)}"]`);
      if (chip) {
        chip.remove();
      }
      FlowState.clearCurrentStudent().then(renderDrawnPanel).catch((error) => {
        statusText.textContent = error.message;
      });
    }

    function showCurrentOrReady() {
      const current = state.drawn[state.drawn.length - 1];
      if (!current) {
        winnerCard.classList.remove("show");
        winnerImage.removeAttribute("src");
        winnerImage.alt = "";
        winnerName.textContent = "準備開抽";
        return;
      }
      winnerImage.src = current.file;
      winnerImage.alt = current.name;
      winnerName.textContent = `${current.no} 號 ${current.name} 上台`;
      winnerCard.classList.add("show");
    }

    function cancelLatest() {
      if (state.spinning || state.drawn.length === 0) return;
      const prize = state.drawn.pop();
      restorePrize(prize);
      showCurrentOrReady();
      statusText.textContent = `已取消 ${prize.name} 這次上台，名單放回待抽。`;
      updateCounts();
    }

    function clearLocalRound() {
      state.drawn = [];
      state.spinning = false;
      winnerCard.classList.remove("show");
      winnerImage.removeAttribute("src");
      winnerImage.alt = "";
      winnerName.textContent = "準備開抽";
      history.innerHTML = "";
    }

    function burstConfetti() {
      const colors = ["#ffd84f", "#e6372f", "#1f7a55", "#1c5fa8", "#fff2c5"];
      for (let i = 0; i < 42; i += 1) {
        const piece = document.createElement("i");
        piece.className = "confetti";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * .25}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.append(piece);
        setTimeout(() => piece.remove(), 2200);
      }
    }

    drawButton.addEventListener("click", draw);
    cancelButton.addEventListener("click", cancelLatest);
    resetButton.addEventListener("click", async () => {
      if (state.spinning) return;
      resetButton.disabled = true;
      drawButton.disabled = true;
      cancelButton.disabled = true;
      statusText.textContent = "正在還原原始資料...";
      try {
        const flow = await FlowState.resetData();
        clearLocalRound();
        loadPrizesFromFlow(flow);
        renderGrid();
        renderDrawnPanel(flow);
        statusText.textContent = "資料已回到原始狀態，全部名單重新開放。";
      } catch (error) {
        statusText.textContent = error.message;
      } finally {
        resetButton.disabled = false;
        updateCounts();
      }
    });

    function loadPrizesFromFlow(flow) {
      prizes = flow.students.filter((student) => !student.學長姐 && student.姓名 !== flow.currentStudentName).map((student, index) => ({
        file: student.照片,
        name: student.姓名,
        nickname: student.綽號,
        no: String(index + 1).padStart(2, "0")
      }));
      state.bag = [...prizes];
    }

    async function initialize() {
      try {
        const flow = await FlowState.init();
        clearLocalRound();
        loadPrizesFromFlow(flow);
        renderGrid();
        renderDrawnPanel(flow);
      } catch (error) {
        statusText.textContent = error.message;
      }
    }

    window.addEventListener("flow-state-change", (event) => renderDrawnPanel(event.detail));
    initialize();
  </script>
</body>
</html>
